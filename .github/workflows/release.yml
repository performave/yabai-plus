name: release

# Build, Developer ID sign, notarize, and publish a yabai-plus release.
#
# Triggers when you push a tag like `v7.1.25-plus.1`. Runs on a macOS runner,
# imports your "Developer ID Application" certificate into a throwaway keychain,
# builds a universal (x86_64 + arm64) binary, signs it with the hardened runtime,
# notarizes it with notarytool (App Store Connect API key), then creates a GitHub
# Release with the `yabai-v<version>.tar.gz` archive attached.
#
# Secret names match the easel repo so you can reuse the same values:
#   APPLE_CERTIFICATE           base64 of exported "Developer ID Application" .p12
#                               (export from Keychain Access; `base64 -i cert.p12 | pbcopy`)
#   APPLE_CERTIFICATE_PASSWORD  password set when exporting the .p12
#   APPLE_KEYCHAIN_PASSWORD     any random string; used for the temp CI keychain
#   APPLE_SIGNING_IDENTITY      e.g. "Developer ID Application: Eric Wang (TEAMID)"
#   APPLE_API_KEY               App Store Connect API key id   (e.g. ABC123DEF4)
#   APPLE_API_ISSUER            App Store Connect issuer id    (a UUID)
#   APPLE_API_PRIVATE_KEY       raw contents of AuthKey_XXXX.p8 (paste the PEM text)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, e.g. v7.1.25-plus.1
        required: true

permissions:
  contents: write   # needed to create the GitHub Release

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Import Apple signing certificate
        # Creates a temporary `signing_temp` keychain, imports the Developer ID
        # cert, and sets the key partition list so codesign can use it
        # non-interactively. Replaces the manual `security` keychain dance.
        uses: apple-actions/import-codesign-certs@v7.0.0
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build (universal)
        run: make install VERSION="${RELEASE_TAG}"

      - name: Build man page
        run: |
          set -euo pipefail
          brew install asciidoctor >/dev/null
          make man

      - name: Codesign (hardened runtime)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          codesign --force --timestamp --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" bin/yabai
          codesign --verify --strict --verbose=2 bin/yabai

      - name: Prepare App Store Connect API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s\n' "$APPLE_API_PRIVATE_KEY" > "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Notarize
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          # notarytool needs a zip/pkg/dmg; a bare Mach-O can't be submitted directly.
          ditto -c -k --keepParent bin/yabai "$RUNNER_TEMP/yabai-notarize.zip"

          xcrun notarytool submit "$RUNNER_TEMP/yabai-notarize.zip" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          # NOTE: a standalone CLI binary can't be stapled; Gatekeeper verifies the
          # notarization ticket online on first run, which is sufficient.

      - name: Apply Finder icon
        run: make icon

      - name: Assemble archive
        id: archive
        run: |
          set -euo pipefail
          VERSION="$(bin/yabai --version)"   # e.g. yabai-v7.1.25-plus.1
          rm -rf archive && mkdir -p archive
          cp -r bin archive/
          cp -r doc archive/
          cp -r examples archive/
          tar -cvzf "bin/${VERSION}.tar.gz" archive
          rm -rf archive
          SHA256="$(shasum -a 256 "bin/${VERSION}.tar.gz" | cut -d' ' -f1)"
          printf '%s  %s.tar.gz\n' "${SHA256}" "${VERSION}" > "bin/${VERSION}.tar.gz.sha256"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tarball=bin/${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=bin/${VERSION}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
          echo "asset=${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "Built ${VERSION}.tar.gz  sha256=${SHA256}"

      - name: Extract changelog notes
        id: notes
        run: |
          set -euo pipefail
          # Tag is e.g. v7.1.25-plus.1 -> changelog heading is "## [7.1.25-plus.1]".
          TAG="${RELEASE_TAG}"
          HEADING="${TAG#v}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          # Pull the body between this version's heading and the next "## " heading.
          awk -v h="## [${HEADING}]" '
            index($0, h) == 1 { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md | sed '/./,$!d' > "$NOTES_FILE"

          if [ -s "$NOTES_FILE" ]; then
            echo "Found changelog section for ${HEADING}:"
            cat "$NOTES_FILE"
            echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "No changelog section for ${HEADING}; will fall back to generated notes."
            echo "file=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ steps.archive.outputs.version }}
          files: |
            ${{ steps.archive.outputs.tarball }}
            ${{ steps.archive.outputs.checksum }}
          body_path: ${{ steps.notes.outputs.file }}
          # Fall back to auto-generated notes only if no changelog section was found.
          generate_release_notes: ${{ steps.notes.outputs.file == '' }}

      - name: Bump Homebrew tap formula
        # Updates Formula/yabai-plus.rb in Performave/homebrew-tap to point at the
        # release just published. Requires a HOMEBREW_TAP_TOKEN secret (a token
        # with contents:write on the tap repo); skipped if it isn't configured.
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
          ASSET: ${{ steps.archive.outputs.asset }}
          SHA256: ${{ steps.archive.outputs.sha256 }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping tap bump."
            exit 0
          fi

          TAP_REPO="Performave/homebrew-tap"
          FORMULA="Formula/yabai-plus.rb"
          PLUS_VERSION="${TAG#v}"   # v7.1.25-plus.1 -> 7.1.25-plus.1
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ASSET}"

          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          cd tap

          # macOS runner -> BSD sed. Replace only the top-level formula fields.
          sed -i '' -E \
            -e "s|^  url \".*\"|  url \"${URL}\"|" \
            -e "s|^  version \".*\"|  version \"${PLUS_VERSION}\"|" \
            -e "s|^  sha256 \".*\"|  sha256 \"${SHA256}\"|" \
            "${FORMULA}"

          echo "Updated ${FORMULA}:"
          grep -E '^  (url|version|sha256) ' "${FORMULA}"

          if git diff --quiet -- "${FORMULA}"; then
            echo "Formula already up to date; nothing to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "yabai-plus ${PLUS_VERSION}"
          git push
